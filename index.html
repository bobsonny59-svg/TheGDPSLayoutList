            /* Global defaults (light mode) */
            body {
                background: #f2f5fa;
                color: #1a1e26;
                font-family: 'Lexend Deca', sans-serif;
                margin: 0;
                padding: 0;
                transition: background 0.3s ease, color 0.3s ease;
            }

            /* Override for dark mode on the main containers */
            .dark {
                background: #0d0f14 !important;
                color: #eaeef2 !important;
            }

            /* But we need to apply to header and router-view specifically */
            header.dark {
                background: #191c25 !important;
                border-color: rgba(255,255,255,0.08) !important;
                box-shadow: 0 4px 30px rgba(0,0,0,0.6) !important;
            }
            .view.dark {
                background: #0d0f14 !important;
                color: #eaeef2 !important;
            }

            /* Header styling – polished */

                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 28px;
                background: #ffffff;
                border-radius: 24px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.04);
                border: 1px solid rgba(0,0,0,0.04);
                margin-bottom: 32px;
                transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
                backdrop-filter: blur(8px);
            }
            header:not(.dark) {
                background: rgba(255,255,255,0.8);

                color: #1a1e26;
            }
            .dark .nav__tab {

            }

                color: #eaeef2;
            }

                background: rgba(124, 109, 240, 0.12) !important;
                color: #7c6df0 !important;
            }
            .dark .router-link-active {
                background: rgba(124, 109, 240, 0.18) !important;
                color: #a78bfa !important;
            }

            .nav__actions {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-left: 12px;
            }
            .nav__icon {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: transparent;
                border: none;
                cursor: pointer;
                transition: background 0.2s;
                color: #5f6b7a;
                font-size: 1.2rem;

                background: rgba(0,0,0,0.06);
                color: #1a1e26;
            }
            .dark .nav__icon {
                color: #94a3b8;
            }
            .dark .nav__icon:hover {
                background: rgba(255,255,255,0.06);
                color: #eaeef2;
            }
            .nav__icon img {
                width: 22px;
                height: 22px;
                filter: invert(0.4);
            }
            .dark .nav__icon img {
                filter: invert(0.8);
            }

                padding: 8px 20px;
                border-radius: 40px;
                background: #7c6df0;
                color: #ffffff !important;
                font-weight: 600;
                font-size: 0.9rem;
                text-decoration: none;
                transition: background 0.2s, transform 0.1s;
                border: none;
                cursor: pointer;
            }
            .nav__cta:hover {
                background: #5f4ddb;
                transform: scale(1.02);
            }

            .view {
                padding: 20px 0;
                animation: fadeUp 0.3s ease;
            }
            @keyframes fadeUp {
                0% { opacity: 0; transform: translateY(12px); }
                100% { opacity: 1; transform: translateY(0); }
            }

            /* List page – cards */
            .record-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
            .record-card {
                background: rgba(255,255,255,0.6);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border-radius: 20px;
                padding: 20px;
                border: 1px solid rgba(255,255,255,0.6);

                transition: all 0.25s;
                display: flex;
                flex-direction: column;
                gap: 6px;
            }
            .dark .record-card {
                background: rgba(255,255,255,0.04);
                border-color: rgba(255,255,255,0.06);
                box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            }
            .record-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            }
            .dark .record-card:hover {
                box-shadow: 0 8px 30px rgba(0,0,0,0.4);
                border-color: rgba(124,109,240,0.3);
            }
            .record-card .rank {
                font-size: 0.7rem;
                font-weight: 600;
                color: #8892a8;
                letter-spacing: 0.5px;
            }
            .dark .record-card .rank {
                color: #94a3b8;
            }
            .record-card .title {
                font-size: 1.3rem;
                font-weight: 700;
                color: #1a1e26;
            }
            .dark .record-card .title {
                color: #eaeef2;
            }
            .record-card .meta {
                display: flex;
                justify-content: space-between;
                font-size: 0.85rem;
                color: #5f6b7a;
            }
            .dark .record-card .meta {
                color: #8892a8;
            }
            .record-card .badge {
                background: rgba(124,109,240,0.12);
                color: #7c6df0;

                font-weight: 600;
                align-self: flex-start;

            .dark .record-card .badge {
                background: rgba(124,109,240,0.18);
                color: #a78bfa;
            }

            /* Leaderboard table */
            .leaderboard-table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                background: rgba(255,255,255,0.5);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 4px 16px rgba(0,0,0,0.02);
            }
            .dark .leaderboard-table {
                background: rgba(255,255,255,0.04);
                box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            }
            .leaderboard-table th {
                text-align: left;
                padding: 16px 20px;
                font-weight: 600;
                color: #5f6b7a;
                font-size: 0.75rem;
                letter-spacing: 0.5px;
                background: rgba(0,0,0,0.02);
                text-transform: uppercase;
            }
            .dark .leaderboard-table th {
                color: #94a3b8;
                background: rgba(255,255,255,0.03);
            }
            .leaderboard-table td {
                padding: 14px 20px;
                border-top: 1px solid rgba(0,0,0,0.04);
                color: #1a1e26;
            }
            .dark .leaderboard-table td {
                border-top: 1px solid rgba(255,255,255,0.04);
                color: #eaeef2;
            }
            .leaderboard-table tr:hover td {
                background: rgba(0,0,0,0.02);
            }
            .dark .leaderboard-table tr:hover td {
                background: rgba(255,255,255,0.02);
            }
            .leaderboard-table .gold { color: #facc15; }
            .leaderboard-table .silver { color: #94a3b8; }
            .leaderboard-table .bronze { color: #cd7f32; }

            /* Roulette */
            .roulette-wrapper {
                text-align: center;
                padding: 40px 20px;
            }
            .roulette-display {
                background: rgba(255,255,255,0.4);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                border-radius: 40px;
                border: 1px solid rgba(255,255,255,0.5);
                padding: 40px;
                margin-bottom: 30px;
                transition: background 0.3s, border-color 0.3s;
                min-height: 160px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 8px;
                font-size: 2.2rem;
                font-weight: 700;
                color: #1a1e26;
            }
            .dark .roulette-display {
                background: rgba(255,255,255,0.04);
                border-color: rgba(255,255,255,0.06);
                color: #eaeef2;
            }
            .roulette-display .sub {
                font-size: 1rem;
                color: #5f6b7a;
                font-weight: 400;
            }
            .dark .roulette-display .sub {
                color: #8892a8;
            }
            .roulette-spin {
                padding: 14px 48px;
                border-radius: 60px;
                background: #7c6df0;
                color: #fff;
                font-weight: 600;
                font-size: 1.1rem;
                border: none;
                cursor: pointer;
                transition: background 0.2s, transform 0.1s;
                box-shadow: 0 4px 12px rgba(124,109,240,0.3);
            }
            .roulette-spin:hover {
                background: #5f4ddb;
                transform: scale(1.04);
            }
            .roulette-spin:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

            /* Small tweaks */
            .type-label-lg {
                font-weight: 500;
            }
            /* For the logo alignment */
            .logo {
                display: flex;
                align-items: baseline;
                gap: 6px;
            }
            /* Make sure the dark class is applied to header and view, and we style accordingly */
            /* Already did that above. */

            /* Responsive - keep original viewport */
            @media (max-width: 1024px) {
                body {
                    padding: 16px;
                }
                header {
                    flex-wrap: wrap;
                    gap: 12px;
                    padding: 16px;
                }
                .nav {
                    flex-wrap: wrap;
                    justify-content: center;
                }
                .nav__actions {
                    margin-left: 0;
                }
                .record-grid {
                    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                }
            }
            @media (max-width: 600px) {
                .record-grid {
                    grid-template-columns: 1fr;
                }
                .leaderboard-table th,
                .leaderboard-table td {
                    padding: 10px 12px;
                    font-size: 0.8rem;
                }
                .roulette-display {
                    font-size: 1.6rem;
                    padding: 24px;
                }
                .nav__tab {
                    font-size: 0.8rem;
                    padding: 6px 12px;
                }
            }

            /* Fix for the dark/light toggle icon – we keep the same img src */
            .nav__icon img {
                width: 22px;
                height: 22px;
                display: block;
            }
            /* No need to change anything else */

    <body id="app">
        <header :class="{ dark: store.dark }">
            <div class="logo">
                <h2>Larp List</h2>
                <p>v1.0.0</p>
            </div>
            <nav class="nav">
                <router-link class="nav__tab" to="/">
                    <span class="type-label-lg">List</span>
                </router-link>
                <router-link class="nav__tab" to="/leaderboard">
                    <span class="type-label-lg">Leaderboard</span>
                </router-link>
                <router-link class="nav__tab" to="/roulette">
                    <span class="type-label-lg">Roulette</span>
                </router-link>
                <div class="nav__actions">
                    <button
                        class="nav__icon"
                        @click.prevent="store.toggleDark()"
                    >
                        <img
                            :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'"
                            alt=""
